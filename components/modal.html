<div id="contact-modal" class="modal">
    <div class="modal__content">
        <span class="modal__close">&times;</span>
        <h2 class="modal__title">Оставить заявку</h2>
        <p class="modal__subtitle">Оставьте ваши контакты, и наш менеджер свяжется с вами в течение 15 минут</p>
        <form class="modal__form">
            <input type="text" class="modal__input" placeholder="Ваше имя" required>
            <input type="tel" class="modal__input" placeholder="Ваш номер телефона" required>
            <button type="submit" class="modal__btn">Отправить заявку</button>
        </form>
        <div class="modal__contacts">
            <p class="modal__contacts-text">Или свяжитесь с нами напрямую:</p>
            <div class="modal__contacts-links">
                <a href="tel:+79991234567" class="modal__phone">+7 (999) 123-45-67</a>
                <div class="modal__socials">
                    <a href="#" class="messenger-icon" aria-label="Написать в Max">
                        <img src="images/max.png" alt="Max">
                    </a>
                    <a href="#" class="messenger-icon" aria-label="Написать в Telegram">
                        <img src="images/telegramm.png" alt="Telegram">
                    </a>
                </div>
            </div>
        </div>
    </div>
</div>
